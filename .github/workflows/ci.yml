name: CI — Test & Publish Report

on:
  workflow_dispatch:
  push:
    branches: [ dev_2 ]
  pull_request:
    branches: [ dev_2 ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and run tests
        run: mvn -B clean test

      - name: Generate Surefire HTML report
        run: mvn surefire-report:report

      - name: Prepare report for Pages
        run: |
          # ensure the site directory exists and list files for debug
          ls -la target || true
          ls -la target/site || true

  deploy-pages:
    needs: build-and-report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy `target/site` to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site
